<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and purchase video games on Stellar, including action, rpg, horror and adventure titles.">
    <meta name="keywords" content="games, gaming, pc games, action games, rpg games, STELLAR">
    <link rel="stylesheet" href="/My Website/CSS/styles.css">
    <title>Action Games</title>
</head>
<body>
    <header class="site-header">
        <!--STELLAR has to on the right side of the logo. Both them and the logo are far to the left-->
        
        <div class="logo">
            <img src="/My Website/Images/StoreFront logo.png" alt="STELLAR logo" width="80">
            <h1> STELLAR</h1>
        </div>

        <!--Nav contents to the far right of the screen-->
        <div>
            <nav class="main-nav">
                <a href="index.html" title="Home page">Home</a> 
                <a href="About_Us.html" title="About Us page">About Us</a> 
                <a href="Contact.html" title="Contact page">Contact</a> 
                <a href="Enquiry.html" title="Enquiry page">Enquiry</a> 
                <a href="Products.html" title="Products page">Products</a>   
            </nav>
        </div>
    </header>

    <main>
        <section class="store-header">
            <a href="/My Website/Products.html" class="back-link">&larr; Back to Store</a>
            <h1>Adventure Games</h1>
        </section>

        <section class="featured-section">
            <div class="games-grid">

                <article class="game-card">
                    <div class="card-image">
                        <a href="/My Website/Product_page_game_files/Paradise_Killer.html">
                            <img src="/My Website/Images/Paradise Killer.jpg" alt="Paradise Killer">
                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">
                        <h3>Paradise Killer</h3>
                        <p class="price">R 185.00</p>
                    </div>
                </article>

                <article class="game-card">
                    <div class="card-image">
                        <a href="/My Website/Product_page_game_files/Alan_Wake.html">
                            <img src="/My Website/Images/Alan wake.jpg" alt="Alan Wake">
                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">
                        <h3>Alan Wake</h3>
                        <p class="price">R 145.00</p>
                    </div>
                </article>

                <article class="game-card">
                    <div class="card-image">
                        <a href="/My Website/Product_page_game_files/LA-Noire.html">
                            <img src="/My Website/Images/LA Noire( Discounted Games ).jpg" alt="LA Noire">
                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">
                        <h3>LA Noire</h3>
                        <p class="price"><span class="original-price">R 359.00</span>R 200.00</p>
                    </div>
                </article>

                <article class="game-card">
                    <div class="card-image">
                        <a href="/My Website/Product_page_game_files/Peak.html">
                            <img src="/My Website/Images/Peak( newer game ).jpg" alt="Peak">
                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">
                        <h3>Peak</h3>
                        <p class="price">R 80.00</p>
                    </div>
                </article>

                <article class="game-card">
                    <div class="card-image">
                        <a href="/My Website/Product_page_game_files/RV_There_Yet.html">
                            <img src="/My Website/Images/RV There Yet( newer game ).jpg" alt="RV There Yet">
                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">
                        <h3>RV There Yet</h3>
                        <p class="price">R 82.00</p>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; Stellar 2026</p>
    </footer>

    <script src="/My Website/JavaScript/script.js"></script>
</body>
</html>
