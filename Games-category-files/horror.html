<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and purchase video games on Stellar, including action, rpg, horror and adventure titles.">
    <meta name="keywords" content="games, gaming, pc games, action games, rpg games, STELLAR">
   <link rel="stylesheet" href="../CSS/styles.css">
    <title>Action Games</title>
</head>
<body>
   <header class="site-header">
        <!--STELLAR has to on the right side of the logo. Both them and the logo are far to the left-->
        
        <div class="logo">
            <img src="../Images/StoreFront logo.png" alt="STELLAR logo" width="80">
            <h1> STELLAR</h1>
        </div>

        <!--Nav contents to the far right of the screen-->
        <div>
            <nav class="main-nav">
                <a href="../index.html" title="Home page">Home</a> 
                <a href="../About_Us.html" title="About Us page">About Us</a> 
                <a href="../Contact.html" title="Contact page">Contact</a> 
                <a href="../Enquiry.html" title="Enquiry page">Enquiry</a> 
                <a href="../Products.html" title="Products page">Products</a>   
            </nav>
        </div>
    </header>

    <main>
        <section class="store-header">
            <a href="/Products.html" class="back-link">&larr; Back to Store</a>
            <h1>Horror Games</h1>
        </section>

        <section class="featured-section">
            <div class="games-grid">

                <article class="game-card">
                    <div class="card-image">
                        <a href="Product_page_game_files/Alan_Wake.html">
                            <img src="Images/Alan wake.jpg" alt="Alan Wake">
                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">
                        <h3>Alan Wake</h3>
                        <p class="price">R 145.00</p>
                    </div>
                </article>

                <article class="game-card">
                    <div class="card-image">
                        <a href="Product_page_game_files/Lethal_Company.html">
                            <img src="Images/Lethal Company( newer game ).jpg" alt="Lethal Company">
                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">
                        <h3>Lethal Company</h3>
                        <p class="price">R 100.00</p>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; Stellar 2026</p>
    </footer>

   <script src="../JavaScript/script.js"></script>
</body>
</html>
