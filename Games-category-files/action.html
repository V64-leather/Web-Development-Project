<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <header class="site-header">
        <!--STELLAR has to on the right side of the logo. Both them and the logo are far to the left-->
        
        <div class="logo">
            <img src="/Images/StoreFront logo.png" alt="STELLAR logo" width="80">
            <h1> STELLAR</h1>
        </div>

        <!--Nav contents to the far right of the screen-->
        <div>
            <nav class="main-nav">
                <a href="index.html" title="Home page">Home</a> 
                <a href="About_Us.html" title="About Us page">About Us</a> 
                <a href="Contact.html" title="Contact page">Contact</a> 
                <a href="Enquiry.html" title="Enquiry page">Enquiry</a> 
                <a href="Products.html" title="Products page">Products</a>

        </div>

    <main>
        <section class="store-header">
            <a href="/Products.html" class="back-link">&larr; Back to Store</a>
            <h1>Action Games</h1>
        </section>

        <section class="featured-section">
            <div class="games-grid">

                <article class="game-card">
                    <div class="card-image">
                        <a href="/Product_page_game_files/Batman_Arkham_City.html">

                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">
                        <h3>Batman: Arkham City</h3>
                        <p class="price"><span class="original-price">R 219.00</span>R 95.00</p>
                    </div>
                </article>

                <article class="game-card">
                    <div class="card-image">
                        <a href="/Product_page_game_files/Hitman_absolution.html">

                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>

                    <div class="card-info">
                        <h3>Hitman Absolution</h3>

                    </div>
                </article>

                <article class="game-card">
                    <div class="card-image">
                        <a href="/Product_page_game_files/Assassins_Creed_2.html">

                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">

                    </div>
                </article>

                <article class="game-card">
                    <div class="card-image">
                        <a href="/Product_page_game_files/Tomb_Raider_2013.html">

                        </a>
                        <button class="save-btn" title="Save game">&#128278;</button>
                    </div>
                    <div class="card-info">
                        <h3>Tomb Raider</h3>
                        <p class="price"><span class="original-price">R 279.00</span>R 115.00</p>
                    </div>
                </article>
            </div>

    <footer class="site-footer">
        <p>&copy; Stellar 2026</p>
